<!DOCTYPE html>
<html>
<head>
  <title>Teste Botão</title>
</head>
<body>

  <h1>🔥 Teste do botão</h1>
  <p>Clique no botão abaixo para testar o JavaScript:</p>

  <button id="btn-teste" style="padding:15px; font-size:18px;">
    👉 TESTE CLICK
  </button>

  <script>
    // Listener do botão
    document.getElementById('btn-teste').addEventListener('click', function() {
      console.log('O JavaScript está funcionando!');
      alert('Evento disparado com sucesso!');
    });
  </script>

</body>
</html>
